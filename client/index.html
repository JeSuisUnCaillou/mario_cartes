<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario Cartes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; }
    .card-btn {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background: #2c3e50;
      color: #fff;
      border: 2px solid #555;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .card-btn:hover:not(:disabled) { background: #34495e; transform: scale(1.02); }
    .card-btn:disabled { cursor: default; }
    .status-lap, .status-round { font-size: 1rem; color: #aaa; margin-bottom: 0.25rem; }
    .status-phase { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
